    - data:
        code: |
          import json
          import re
          from datetime import datetime

          def main(extract_data, calculate_result, validate_result, reimbursement_type):
              # 解析数据
              try:
                  if isinstance(extract_data, str):
                      extract = json.loads(extract_data)
                  else:
                      extract = extract_data if extract_data else {}
              except:
                  extract = {}

              try:
                  if isinstance(calculate_result, str):
                      calc = json.loads(calculate_result)
                  else:
                      calc = calculate_result if calculate_result else {}
              except:
                  calc = {}

              try:
                  if isinstance(validate_result, str):
                      json_match = re.search(r'```json\s*(.*?)\s*```', validate_result, re.DOTALL)
                      if json_match:
                          validate = json.loads(json_match.group(1))
                      else:
                          validate = json.loads(validate_result)
                  else:
                      validate = validate_result if validate_result else {}
              except:
                  validate = {"status": "未知", "can_submit": True}

              # 生成报销单号
              company_code = extract.get('company_code', '00') or '00'
              flow_no = f"CLBX{company_code.zfill(2)}{datetime.now().strftime('%Y%m')}0001"

              # 生成标题
              reimbursment_person = extract.get('reimbursment_person') or '申请人'
              title = f"差旅报销-{reimbursment_person}-{datetime.now().strftime('%Y-%m-%d')}"

              # 字段值显示
              def show_val(val, default='❌ 未填写'):
                  if val is None or val == '':
                      return default
                  return val

              def show_bool(val, default='否'):
                  if val is None or val == '':
                      return default
                  return val

              # 构建表单
              form = f"""
          ╔══════════════════════════════════════════════════════════════╗
          ║                    💰 差旅报销表单                            ║
          ╚══════════════════════════════════════════════════════════════╝

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【基本信息】                            ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            报销单号　：{flow_no}（系统自动生成）
            标　　题　：{title}（系统自动生成）
            创建日期　：{datetime.now().strftime('%Y-%m-%d %H:%M')}（系统自动生成）
            申 请 人　：{show_val(extract.get('applicant_name'), '当前用户')}
            员 工 号　：{show_val(extract.get('employee_id'), '系统带出')}
            创建人公司：{show_val(extract.get('company_code'), '系统带出')}
            创建人部门：{show_val(extract.get('department'), '系统带出')}
            报销类型　：{show_val(reimbursement_type)}

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【报销人信息】                          ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            实际报销人　　：{show_val(extract.get('reimbursment_person'))} ★必填
            实际报销人工号：{show_val(extract.get('reimbursment_person_id'), '根据报销人带出')}
            实际报销人部门：{show_val(extract.get('reimbursment_dept'), '根据报销人带出')}
            成本中心　　　：{show_val(extract.get('cost_center'))} ★必填
            内部订单号　　：{show_val(extract.get('internal_order'), '（仅10/20/30/40/60公司显示）')}
            是否第三方承担：{show_bool(extract.get('third_party_bear'))}
            第三方承担单位：{show_val(extract.get('third_party_unit'), '（第三方承担时必填）')}
            携程预订酒店　：{show_bool(extract.get('book_via_ctrip'))}"""

              # 根据报销类型显示不同信息
              if reimbursement_type == "出差申请":
                  form += f"""

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                    【出差申请信息】                          ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            出差申请单号　：{show_val(extract.get('travel_request_no'))} ★必填
            出 发 地　　：{show_val(extract.get('origin'))} ★必填
            目 的 地　　：{show_val(extract.get('destination'))} ★必填
            申请出发日　：{show_val(extract.get('apply_start_date'))}
            申请返程日　：{show_val(extract.get('apply_end_date'))}
            申请天数　　：{extract.get('apply_days', 0)} 天
            实际出发日　：{show_val(extract.get('actual_start_date'))} ★必填
            实际返程日　：{show_val(extract.get('actual_end_date'))} ★必填
            实际天数　　：{calc.get('actual_days', 0)} 天（自动计算）
            交通工具　　：{show_val(extract.get('transport'))} ★必填
            早 餐 次 数 ：{extract.get('breakfast_count', 0)} 次
            午 餐 次 数 ：{extract.get('lunch_count', 0)} 次
            晚 餐 次 数 ：{extract.get('dinner_count', 0)} 次"""

              elif reimbursement_type == "CRM工单":
                  form += f"""

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                    【CRM工单信息】                           ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            CRM工单号　　：{show_val(extract.get('crm_order_no'))} ★必填
            出 发 日 期 ：{show_val(extract.get('crm_start_date'))}
            返 程 日 期 ：{show_val(extract.get('crm_end_date'))}
            车 牌 号　　：{show_val(extract.get('crm_car_no'), '无')}
            客 户 名 称 ：{show_val(extract.get('customer_name'))}
            客 户 地 址 ：{show_val(extract.get('customer_address'))}
            出 发 地　　：{show_val(extract.get('crm_origin'))} ★必填
            目 的 地　　：{show_val(extract.get('crm_destination'))} ★必填
            实际出差天数：{show_val(extract.get('actual_travel_days'), calc.get('actual_days', 0))} 天
            往返公里数　：{show_val(extract.get('round_trip_km'), '系统计算')} 公里"""

              # 交通费明细
              transport_fee = calc.get('transport_fee', {})
              form += f"""

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【交通费明细】                          ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            交通费票据数：{transport_fee.get('count', 0)} 张
            交通费合计　：¥ {transport_fee.get('total', 0):,.2f}
            发票号码　　：{', '.join(transport_fee.get('invoices', []))}"""

              # 住宿费明细
              accommodation_fee = calc.get('accommodation_fee', {})
              form += f"""

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【住宿费明细】                          ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            住宿费票据数：{accommodation_fee.get('count', 0)} 张
            不含税金额　：¥ {accommodation_fee.get('ex_tax', 0):,.2f}
            进项税额　　：¥ {accommodation_fee.get('tax', 0):,.2f}
            住宿费合计　：¥ {accommodation_fee.get('total', 0):,.2f}
            住宿标准　　：¥ {accommodation_fee.get('standard', 0):,.2f}/晚
            标准总额　　：¥ {accommodation_fee.get('standard_total', 0):,.2f}
            超标金额　　：¥ {accommodation_fee.get('over_standard', 0):,.2f}"""

              # 差旅补贴明细
              subsidy = calc.get('subsidy', {})
              form += f"""

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【差旅补贴】                            ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            补贴基础金额：¥ {subsidy.get('base', 0):,.2f}
            扣除金额　　：¥ {subsidy.get('deduction', 0):,.2f}"""

              if subsidy.get('deduction_details'):
                  form += "\n            扣除明细　　："
                  for detail in subsidy['deduction_details']:
                      form += f"\n               • {detail}"

              form += f"""
            实际补贴金额：¥ {subsidy.get('final', 0):,.2f}

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【费用汇总】                            ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
            交通费合计　：¥ {transport_fee.get('total', 0):,.2f}
            住宿费合计　：¥ {accommodation_fee.get('total', 0):,.2f}
            差旅补贴　　：¥ {subsidy.get('final', 0):,.2f}
            超标扣除　　：¥ {accommodation_fee.get('over_standard', 0):,.2f}
            ────────────────────────────────────────
            申请金额合计：¥ {calc.get('total_amount', 0):,.2f}

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【合规校验】                            ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"""

              status = validate.get('status', '正常')
              can_submit = validate.get('can_submit', True)

              if can_submit:
                  form += f"\n            状态：✅ {status}"
              else:
                  form += f"\n            状态：❌ {status}"

              # 缺失字段
              if validate.get('missing_required'):
                  form += f"\n            缺失必填字段：{', '.join(validate['missing_required'])}"

              # 异常信息
              if validate.get('errors'):
                  form += f"\n            ⛔ 强控异常："
                  for err in validate['errors']:
                      form += f"\n               • {err}"
              if validate.get('warnings'):
                  form += f"\n            ⚠️ 提醒事项："
                  for warn in validate['warnings']:
                      form += f"\n               • {warn}"

              # 建议
              if validate.get('suggestions'):
                  form += f"\n            💡 修改建议："
                  for sug in validate['suggestions']:
                      form += f"\n               • {sug}"

              form += """

          ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
          ┃                      【下一步操作】                          ┃
          ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"""

              if can_submit:
                  form += "\n            ✅ 表单已通过校验，可以提交至OA系统审批"
              else:
                  form += "\n            ❌ 请补充缺失信息或修正异常后重新提交"

              form += "\n\n          ═════════════════════════════════════════════════════════"

              return {
                  "form_text": form,
                  "form_data": {
                      "flow_no": flow_no,
                      "title": title,
                      "extract": extract,
                      "calculate": calc,
                      "validate": validate,
                      "reimbursement_type": reimbursement_type
                  },
                  "can_submit": can_submit
              }
        code_language: python3
        outputs:
          form_text:
            children: null
