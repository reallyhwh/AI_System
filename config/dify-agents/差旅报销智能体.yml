    # ==================== 报销类型识别 LLM ====================
    - data:
        context:
          enabled: false
        model:
          completion_params: {}
          mode: chat
          name: qwen2.5-3b-instruct
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: type_system
          role: system
          text: |
            # 角色：差旅报销信息识别专家

            ## 任务
            从用户输入中识别报销类型和票据信息，严格按照JSON格式输出。

            ## 当前日期
            今天是2026-04-26，请据此计算相对日期。

            ## 报销类型识别
            - 如果用户提到"出差申请"、"出差单号"、"出差申请单"等，识别为"出差申请"
            - 如果用户提到"CRM工单"、"工单号"、"客户服务"等，识别为"CRM工单"
            - 默认为"出差申请"

            ## 需要提取的字段

            ### 一、基本信息
            - reimbursement_type: 报销类型（出差申请/CRM工单）
            - applicant_name: 申请人姓名
            - employee_id: 员工号
            - company_code: 公司编码
            - department: 部门名称

            ### 二、报销人信息
            - reimbursment_person: 实际报销人姓名
            - reimbursment_person_id: 实际报销人工号
            - reimbursment_dept: 实际报销人部门
            - cost_center: 成本中心编码
            - internal_order: 内部订单号（仅10/20/30/40/60公司）

            ### 三、出差申请类型字段（报销类型为"出差申请"时）
            - travel_request_no: 出差申请单号
            - origin: 出发地
            - destination: 目的地
            - apply_start_date: 申请出发日
            - apply_end_date: 申请返程日
            - apply_days: 申请天数
            - actual_start_date: 实际出发日
            - actual_end_date: 实际返程日
            - transport: 交通工具（飞机/客运大巴/船/火车/动车/高铁/自驾车/售后服务车）
            - breakfast_count: 早餐次数
            - lunch_count: 午餐次数
            - dinner_count: 晚餐次数

            ### 四、CRM工单类型字段（报销类型为"CRM工单"时）
            - crm_order_no: CRM工单号
            - crm_start_date: 出发日期
            - crm_end_date: 返程日期
            - crm_car_no: 车牌号
            - customer_name: 客户名称
            - customer_address: 客户地址
            - crm_origin: 出发地
            - crm_destination: 目的地
            - actual_travel_days: 实际出差天数
            - round_trip_km: 往返公里数

            ### 五、交通费信息（从票据识别）
            - transport_fee_list: 交通费列表，每项包含：
              - date: 日期
              - origin: 出发地
              - destination: 目的地
              - amount: 金额
              - currency: 币种
              - invoice_no: 发票号码

            ### 六、住宿费信息（从票据识别）
            - accommodation_fee_list: 住宿费列表，每项包含：
              - city: 住宿城市
              - days: 住宿天数
              - currency: 币种
              - amount_ex_tax: 不含税金额
              - tax_amount: 进项税额
              - total_amount: 住宿费总金额
              - invoice_no: 发票号码

            ### 七、其他信息
            - third_party_bear: 是否第三方承担费用（是/否）
            - third_party_unit: 第三方费用承担单位
            - book_via_ctrip: 是否通过携程预订酒店（是/否）
            - other_attachments: 其他附件说明

            ## 输出格式
            严格按以下JSON格式输出：

            ```json
            {
              "reimbursement_type": "出差申请",
              "applicant_name": null,
              "employee_id": null,
              "company_code": null,
              "department": null,
              "reimbursment_person": null,
              "reimbursment_person_id": null,
              "reimbursment_dept": null,
              "cost_center": null,
              "internal_order": null,
              "travel_request_no": null,
              "origin": null,
              "destination": null,
              "apply_start_date": null,
              "apply_end_date": null,
              "apply_days": null,
              "actual_start_date": null,
              "actual_end_date": null,
              "transport": null,
              "breakfast_count": 0,
              "lunch_count": 0,
              "dinner_count": 0,
              "crm_order_no": null,
              "crm_start_date": null,
              "crm_end_date": null,
              "crm_car_no": null,
              "customer_name": null,
              "customer_address": null,
              "crm_origin": null,
              "crm_destination": null,
              "actual_travel_days": null,
              "round_trip_km": null,
              "transport_fee_list": [],
              "accommodation_fee_list": [],
              "third_party_bear": "否",
              "third_party_unit": null,
              "book_via_ctrip": "否",
              "other_attachments": null
            }
            ```

            ## 注意事项
            1. 只输出JSON，不要有任何其他文字
            2. 日期必须转换为YYYY-MM-DD格式
            3. 根据报销类型填充对应字段
            4. 交通费和住宿费从用户描述中提取金额信息
        - id: type_user
          role: user
          text: '用户输入：{{#sys.query#}}'
        selected: false
        title: 报销类型识别
        type: llm
        vision:
          enabled: false
      height: 87
      id: type_llm
      position:
        x: 380
        y: 265
      positionAbsolute:
        x: 380
        y: 265
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242

    # ==================== 信息提取 Code ====================
    - data:
        code: |
          import json
          import re
          from datetime import datetime, timedelta
          import random

          def main(extract_result):
              # 解析LLM输出的JSON
              try:
                  json_match = re.search(r'```json\s*(.*?)\s*```', extract_result, re.DOTALL)
                  if json_match:
                      data = json.loads(json_match.group(1))
                  else:
                      data = json.loads(extract_result)
              except:
                  data = {"reimbursement_type": "出差申请"}

              reimbursement_type = data.get('reimbursement_type', '出差申请')

              # 模拟从OA系统获取出差申请信息
              if reimbursement_type == "出差申请":
                  # 模拟出差申请数据
                  mock_travel_request = {
                      "travel_request_no": data.get('travel_request_no') or f"CCSQ{datetime.now().strftime('%Y%m')}0001",
                      "origin": data.get('origin') or "厦门",
                      "destination": data.get('destination') or "上海",
                      "apply_start_date": data.get('apply_start_date') or (datetime.now() - timedelta(days=7)).strftime('%Y-%m-%d'),
                      "apply_end_date": data.get('apply_end_date') or (datetime.now() - timedelta(days=5)).strftime('%Y-%m-%d'),
                      "apply_days": data.get('apply_days') or 3,
                      "apply_transport": data.get('transport') or "火车/动车/高铁",
                      "book_via_ctrip": data.get('book_via_ctrip') or "否"
                  }

                  # 计算申请天数
                  if mock_travel_request['apply_start_date'] and mock_travel_request['apply_end_date']:
                      try:
                          start = datetime.strptime(mock_travel_request['apply_start_date'], '%Y-%m-%d')
                          end = datetime.strptime(mock_travel_request['apply_end_date'], '%Y-%m-%d')
                          mock_travel_request['apply_days'] = (end - start).days + 1
                      except:
                          mock_travel_request['apply_days'] = 3

                  data.update(mock_travel_request)

              # 模拟从CRM系统获取工单信息
              elif reimbursement_type == "CRM工单":
                  mock_crm_order = {
                      "crm_order_no": data.get('crm_order_no') or f"CRM{datetime.now().strftime('%Y%m')}0001",
                      "crm_start_date": data.get('crm_start_date') or (datetime.now() - timedelta(days=3)).strftime('%Y-%m-%d'),
                      "crm_end_date": data.get('crm_end_date') or (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d'),
                      "crm_car_no": data.get('crm_car_no') or "闽D12345",
                      "customer_name": data.get('customer_name') or "示例客户有限公司",
                      "customer_address": data.get('customer_address') or "上海市浦东新区",
                      "crm_origin": data.get('crm_origin') or "厦门",
                      "crm_destination": data.get('crm_destination') or "上海",
                      "round_trip_km": data.get('round_trip_km') or 1000
                  }
                  data.update(mock_crm_order)

              # 模拟票据识别结果 - 交通费
              transport_fee_list = data.get('transport_fee_list', [])
              if not transport_fee_list:
                  # 如果用户没有提供，生成模拟数据
                  transport_fee_list = [
                      {
                          "date": data.get('actual_start_date') or (datetime.now() - timedelta(days=7)).strftime('%Y-%m-%d'),
                          "origin": data.get('origin') or "厦门",
                          "destination": data.get('destination') or "上海",
                          "amount": 320.00,
                          "currency": "RMB",
                          "invoice_no": f"INV{random.randint(100000, 999999)}"
                      },
                      {
                          "date": data.get('actual_end_date') or (datetime.now() - timedelta(days=5)).strftime('%Y-%m-%d'),
                          "origin": data.get('destination') or "上海",
                          "destination": data.get('origin') or "厦门",
                          "amount": 320.00,
                          "currency": "RMB",
                          "invoice_no": f"INV{random.randint(100000, 999999)}"
                      }
                  ]
              data['transport_fee_list'] = transport_fee_list

              # 模拟票据识别结果 - 住宿费
              accommodation_fee_list = data.get('accommodation_fee_list', [])
              if not accommodation_fee_list:
                  accommodation_fee_list = [
                      {
                          "city": data.get('destination') or "上海",
                          "days": data.get('apply_days', 3) - 1 or 2,
                          "currency": "RMB",
                          "amount_ex_tax": 530.97,
                          "tax_amount": 31.86,
                          "total_amount": 562.83,
                          "invoice_no": f"ACC{random.randint(100000, 999999)}"
                      }
                  ]
              data['accommodation_fee_list'] = accommodation_fee_list

              # 模拟申请人信息
              data['applicant_name'] = data.get('applicant_name') or "张三"
              data['employee_id'] = data.get('employee_id') or "E001234"
              data['company_code'] = data.get('company_code') or "10"
              data['department'] = data.get('department') or "销售部"

              # 实际报销人信息
              data['reimbursment_person'] = data.get('reimbursment_person') or data.get('applicant_name', "张三")
              data['reimbursment_person_id'] = data.get('reimbursment_person_id') or data.get('employee_id', "E001234")
              data['reimbursment_dept'] = data.get('reimbursment_dept') or data.get('department', "销售部")
              data['cost_center'] = data.get('cost_center') or "CC001"

              return {
                  "extract_data": data,
                  "reimbursement_type": reimbursement_type
              }
        code_language: python3
        outputs:
          extract_data:
            children: null
            type: object
          reimbursement_type:
            children: null
            type: string
        selected: false
        title: 信息提取
        type: code
        variables:
        - value_selector:
          - type_llm
          - text
          value_type: string
          variable: extract_result
      height: 51
      id: extract_code
      position:
        x: 680
        y: 265
      positionAbsolute:
        x: 680
        y: 265
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242

    # ==================== 费用计算 Code ====================
    - data:
        code: |
          import json
          from datetime import datetime, timedelta

          def main(extract_data):
              # 解析数据
              try:
                  if isinstance(extract_data, str):
                      data = json.loads(extract_data)
                  else:
                      data = extract_data if extract_data else {}
              except:
                  data = {}

              reimbursement_type = data.get('reimbursement_type', '出差申请')

              # ========== 交通费计算 ==========
              transport_fee_list = data.get('transport_fee_list', [])
              total_transport_fee = sum(float(item.get('amount') or 0) for item in transport_fee_list)
              transport_invoice_list = [item.get('invoice_no') or '' for item in transport_fee_list]

              # ========== 住宿费计算 ==========
              accommodation_fee_list = data.get('accommodation_fee_list', [])
              total_accommodation_fee = sum(float(item.get('total_amount') or 0) for item in accommodation_fee_list)
              total_accommodation_ex_tax = sum(float(item.get('amount_ex_tax') or 0) for item in accommodation_fee_list)
              total_accommodation_tax = sum(float(item.get('tax_amount') or 0) for item in accommodation_fee_list)
              accommodation_invoice_list = [item.get('invoice_no') or '' for item in accommodation_fee_list]

              # ========== 出差天数计算 ==========
              actual_start_date = data.get('actual_start_date') or data.get('apply_start_date')
              actual_end_date = data.get('actual_end_date') or data.get('apply_end_date')

              actual_days = 0
              if actual_start_date and actual_end_date:
                  try:
                      start = datetime.strptime(actual_start_date, '%Y-%m-%d')
                      end = datetime.strptime(actual_end_date, '%Y-%m-%d')
                      actual_days = (end - start).days + 1
                  except:
                      actual_days = data.get('apply_days', 3)

              # ========== 差旅补贴计算 ==========
              # 出发时间和返回时间（用于扣除计算）
              departure_time = data.get('departure_time') or "08:00"  # 默认早班
              return_time = data.get('return_time') or "18:00"  # 默认晚班

              # 判断是否享受补贴
              is_subsidy = data.get('is_subsidy', '是')
              round_trip_km = data.get('round_trip_km') or 1000

              # 补贴基础金额
              destination = data.get('destination') or data.get('crm_destination') or ''
              is_domestic = '国外' not in (data.get('travel_type') or '国内出差')

              subsidy_base = 0
              if is_subsidy == '是':
                  if is_domestic:
                      subsidy_base = 100 * actual_days  # 国内100元/天
                  else:
                      # 国外补贴标准（模拟数据）
                      country_subsidy = {
                          '美国': 500, '德国': 400, '英国': 400, '日本': 350,
                          '新加坡': 350, '韩国': 300, '法国': 380, '澳大利亚': 400
                      }
                      daily_rate = country_subsidy.get(destination, 300)
                      subsidy_base = daily_rate * actual_days

              # ========== 扣除金额计算 ==========
              deduction_amount = 0
              deduction_details = []

              # 1. 出发时间扣除
              dep_hour = int(departure_time.split(':')[0])
              if 10 <= dep_hour < 14:
                  dep_deduction_rate = 0.20
              elif 14 <= dep_hour < 18:
                  dep_deduction_rate = 0.40
              elif 18 <= dep_hour <= 24:
                  dep_deduction_rate = 0.70
              else:
                  dep_deduction_rate = 0

              if is_domestic:
                  dep_deduction = subsidy_base * dep_deduction_rate / actual_days  # 只扣第一天
              else:
                  dep_deduction = subsidy_base * dep_deduction_rate / actual_days
              deduction_amount += dep_deduction
              if dep_deduction > 0:
                  deduction_details.append(f"出发时间扣除: {dep_deduction:.2f}元 ({dep_deduction_rate*100:.0f}%)")

              # 2. 返回时间扣除
              ret_hour = int(return_time.split(':')[0])
              if 10 <= ret_hour < 14:
                  ret_deduction_rate = 0.70
              elif 14 <= ret_hour < 18:
                  ret_deduction_rate = 0.40
              elif 18 <= ret_hour <= 24:
                  ret_deduction_rate = 0
              else:
                  ret_deduction_rate = 0

              if is_domestic:
                  ret_deduction = subsidy_base * ret_deduction_rate / actual_days
              else:
                  ret_deduction = subsidy_base * ret_deduction_rate / actual_days
              deduction_amount += ret_deduction
              if ret_deduction > 0:
                  deduction_details.append(f"返回时间扣除: {ret_deduction:.2f}元 ({ret_deduction_rate*100:.0f}%)")

              # 3. 餐费扣除
              breakfast_count = data.get('breakfast_count') or 0
              lunch_count = data.get('lunch_count') or 0
              dinner_count = data.get('dinner_count') or 0

              if is_domestic:
                  breakfast_rate = 0.10
                  lunch_rate = 0.20
                  dinner_rate = 0.20
              else:
                  breakfast_rate = 0.20
                  lunch_rate = 0.30
                  dinner_rate = 0.30

              daily_subsidy = subsidy_base / actual_days if actual_days > 0 else 0
              meal_deduction = daily_subsidy * (breakfast_count * breakfast_rate + lunch_count * lunch_rate + dinner_count * dinner_rate)
              deduction_amount += meal_deduction
              if meal_deduction > 0:
                  deduction_details.append(f"餐费扣除: {meal_deduction:.2f}元")

              # 最终补贴
              final_subsidy = max(subsidy_base - deduction_amount, 0)

              # ========== 住宿标准校验 ==========
              # 模拟住宿标准（根据城市和职级）
              hotel_standard = {
                  '北京': 450, '上海': 450, '广州': 400, '深圳': 400,
                  '厦门': 350, '杭州': 400, '南京': 380, '成都': 350
              }
              standard_per_night = hotel_standard.get(destination, 350)

              # 计算住宿超标金额
              accommodation_days = sum(item.get('days', 0) for item in accommodation_fee_list)
              standard_total = standard_per_night * accommodation_days
              over_standard_amount = max(total_accommodation_fee - standard_total, 0)

              # ========== 申请金额合计 ==========
              total_amount = total_transport_fee + total_accommodation_fee + final_subsidy - over_standard_amount

              # 构建计算结果
              calculate_result = {
                  "actual_days": actual_days,
                  "transport_fee": {
                      "total": round(total_transport_fee, 2),
                      "count": len(transport_fee_list),
                      "invoices": transport_invoice_list
                  },
                  "accommodation_fee": {
                      "total": round(total_accommodation_fee, 2),
                      "ex_tax": round(total_accommodation_ex_tax, 2),
                      "tax": round(total_accommodation_tax, 2),
                      "count": len(accommodation_fee_list),
                      "invoices": accommodation_invoice_list,
                      "standard": standard_per_night,
                      "standard_total": standard_total,
                      "over_standard": round(over_standard_amount, 2)
                  },
                  "subsidy": {
                      "base": round(subsidy_base, 2),
                      "deduction": round(deduction_amount, 2),
                      "deduction_details": deduction_details,
                      "final": round(final_subsidy, 2),
                      "is_domestic": is_domestic
                  },
                  "total_amount": round(total_amount, 2),
                  "currency": "RMB"
              }

              return {
                  "extract_data": data,
                  "calculate_result": calculate_result,
                  "reimbursement_type": reimbursement_type
              }
        code_language: python3
