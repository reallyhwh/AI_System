app:
  description: '林德叉车差旅报销全流程智能体
    功能：票据识别 → 信息填充 → 费用计算 → 合规校验 → 表单生成
    支持出差申请报销和CRM工单报销两种类型'
  icon: 💰
  icon_background: '#E4F5FF'
  mode: advanced-chat
  name: 差旅报销智能体
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/tongyi:0.1.33@608ec1e7d07dd52e582cff58561a8c75c989951186ffc59452dfffe3d8051230
    version: null
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      - .PDF
      - .DOC
      - .DOCX
      allowed_file_types:
      - image
      - document
      allowed_file_upload_methods:
      - local_file
      remote_url:
      enabled: true
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: '您好！我是差旅报销智能助手。

      请描述您的报销需求，我会帮您：
      ✅ 自动识别票据信息（交通费、住宿费）
      ✅ 从出差申请/CRM工单带出相关信息
      ✅ 计算差旅补贴（含扣除规则）
      ✅ 进行合规性校验和超标处理
      ✅ 生成完整的报销申请表单

      示例输入：
      "我要报销上周到上海出差的费用，高铁票320元，住宿2晚共600元"
      "报销CRM工单C202604001的差旅费用"'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 我要报销上周厦门到上海的出差费用
    - 报销CRM工单的客户服务费用
    - 处理国外出差的报销申请
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
