<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则版本管理 · 高保真</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f2f6fd;
            font-family: 'Inter', sans-serif;
            padding: 28px 24px;
            color: #13294b;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 页面切换动画 */
        .page {
            transition: opacity 0.3s ease;
        }
        .page.hidden {
            display: none;
        }

        /* 卡片质感 */
        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px -14px rgba(12, 40, 80, 0.25), 0 8px 16px -8px rgba(0,32,64,0.12);
            border: 1px solid #e4edfc;
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .brand-icon {
            background: linear-gradient(155deg, #133c7c, #2460d0);
            width: 56px;
            height: 56px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            box-shadow: 0 16px 22px -12px #1e3a8a;
        }
        .brand h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(145deg, #0f2d5a, #1e4daf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 返回按钮 */
        .back-btn {
            background: white;
            border: 1px solid #c9dbf2;
            color: #1f3c78;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
        }
        .back-btn:hover {
            background: #f0f7ff;
            border-color: #7aa5e6;
            box-shadow: 0 6px 12px -8px #2563eb;
        }
        .back-btn i {
            color: #2d5bb5;
        }

        /* 版本卡片区域 */
        .version-section {
            margin-bottom: 24px;
        }
        .version-section h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1f3c78;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .version-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .version-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #e0ebfc;
            box-shadow: 0 12px 24px -16px #0b3166;
            cursor: pointer;
            transition: all 0.2s;
        }
        .version-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 32px -16px #1e3a8a;
            border-color: #2563eb;
        }
        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .version-name {
            font-size: 18px;
            font-weight: 600;
            color: #1e3a8a;
        }
        .version-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .version-status.active {
            background: #e0f2e9;
            color: #0f7b4e;
        }
        .version-status.inactive {
            background: #ffe6e6;
            color: #b13e3e;
        }
        .version-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .info-label {
            color: #4a6fa5;
            min-width: 70px;
        }
        .info-value {
            color: #1f3c78;
            font-weight: 500;
        }
        .date-edit {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .date-edit input {
            padding: 6px 10px;
            border: 1px solid #cfdff2;
            border-radius: 12px;
            font-size: 13px;
            width: 120px;
        }
        .date-edit input:focus {
            border-color: #2563eb;
            outline: none;
        }
        .save-date-btn {
            background: white;
            border: 1px solid #1e3a8a;
            color: #1e3a8a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .save-date-btn:hover {
            background: #1e3a8a;
            color: white;
        }
        .rule-count {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e2edff;
            color: #2563eb;
            font-weight: 500;
        }

        /* 日志区域 */
        .log-section {
            background: white;
            border-radius: 24px;
            padding: 20px 24px;
            border: 1px solid #e0ebfc;
            box-shadow: 0 12px 24px -16px #0b3166;
            margin-top: 24px;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .log-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1f3c78;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .log-filters {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .log-filters input, .log-filters select {
            padding: 8px 14px;
            border: 1px solid #cfdff2;
            border-radius: 16px;
            font-size: 14px;
            background: white;
        }
        .log-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .log-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #f8fcff;
            border-radius: 16px;
            border: 1px solid #e2edff;
            gap: 20px;
            transition: all 0.2s;
        }
        /* 本次修改的日志高亮样式 */
        .log-item.current-version {
            background: #fff9e6;
            border: 2px solid #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }
        .log-item.current-version .log-time {
            color: #1e3a8a;
            font-weight: 700;
        }
        .log-item.current-version .log-version {
            background: #2563eb;
            color: white;
        }
        .log-time {
            font-weight: 600;
            color: #1e3a8a;
            min-width: 160px;
        }
        .log-version {
            background: #dee9fa;
            color: #11356e;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            min-width: 80px;
            text-align: center;
        }
        .log-user {
            color: #4a6fa5;
            min-width: 100px;
        }
        .log-change {
            flex: 1;
            color: #2c3e5c;
        }
        .log-detail {
            font-size: 13px;
            color: #2563eb;
            background: #eef3fd;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
        }
        .log-detail:hover {
            background: #2563eb;
            color: white;
        }

        /* 规则配置界面 - 查询和表单合并区域 */
        .query-form-section {
            background: white;
            border-radius: 28px;
            border: 1px solid #dfebfc;
            box-shadow: 0 18px 38px -16px #0f3169;
            margin-bottom: 16px;
            overflow: hidden;
        }

        /* 查询区域 - 包含自然语音配置 */
        .query-section {
            padding: 20px 24px;
            border-bottom: 1px solid #e2edff;
            background: #f8fcff;
        }
        .query-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .query-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1f3c78;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-panel {
            background: white;
            border-radius: 80px;
            padding: 4px 4px 4px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 450px;
            border: 1px solid #cfdff5;
            box-shadow: 0 4px 12px -8px #2e64c0;
        }
        .ai-panel i {
            color: #2563eb;
            font-size: 20px;
        }
        .ai-panel input {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 14px;
            padding: 10px 0;
            outline: none;
        }
        .ai-panel input::placeholder {
            color: #859fc7;
        }
        .ai-panel button {
            background: #1e3a8a;
            border: none;
            color: white;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.15s;
        }
        .ai-panel button:hover {
            background: #2563eb;
        }
        .query-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px 20px;
        }
        .query-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .query-item label {
            font-size: 12px;
            font-weight: 600;
            color: #3a5c8c;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .query-item input, .query-item select {
            padding: 10px 14px;
            border: 1px solid #cfdff2;
            border-radius: 16px;
            font-size: 14px;
            background: white;
            transition: 0.15s;
            outline: none;
        }
        .query-item input:focus, .query-item select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px #2563eb20;
        }
        .query-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 20px;
        }
        .query-btn {
            background: #1e3a8a;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
        }
        .query-btn:hover {
            background: #2563eb;
        }
        .reset-btn {
            background: white;
            border: 1px solid #c9dbf2;
            color: #1f3c78;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
        }
        .reset-btn:hover {
            background: #f0f7ff;
            border-color: #7aa5e6;
        }

        /* 操作栏 - 下拉菜单样式 */
        .table-action-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            padding: 16px 24px;
            border-bottom: 1px solid #e2edff;
            position: relative;
        }
        .action-btn {
            background: #ffffff;
            border: 1px solid #c9dbf2;
            color: #1f3c78;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .action-btn i { color: #2d5bb5; }
        .action-btn:hover {
            background: #f0f7ff;
            border-color: #7aa5e6;
            box-shadow: 0 6px 12px -8px #2563eb;
        }
        .action-btn.primary-fill {
            background: #1e3a8a;
            border-color: #1e3a8a;
            color: white;
        }
        .action-btn.primary-fill i { color: white; }
        .divider-vertical {
            width: 1px;
            height: 30px;
            background: #d2e2f5;
            margin: 0 6px;
        }
        .spacer { flex: 1; }

        /* 导入按钮下拉菜单 */
        .import-dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            min-width: 200px;
            border-radius: 16px;
            box-shadow: 0 12px 24px -12px #0b3166;
            border: 1px solid #e0ebfc;
            z-index: 1000;
            margin-top: 8px;
            overflow: hidden;
        }
        .dropdown-content.show {
            display: block;
        }
        .dropdown-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.15s;
            color: #1f3c78;
            font-size: 14px;
        }
        .dropdown-item:hover {
            background: #f0f7ff;
        }
        .dropdown-item i {
            color: #2563eb;
            width: 20px;
        }
        .dropdown-item:not(:last-child) {
            border-bottom: 1px solid #e2edff;
        }

        /* 表格区域 */
        .table-wrapper {
            padding: 0 0 0 0;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
            font-size: 13.5px;
        }
        th {
            text-align: left;
            padding: 18px 12px;
            background: #f5faff;
            font-weight: 600;
            color: #12448b;
            border-bottom: 2px solid #cfe0fc;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e2efff;
            color: #1c3155;
            vertical-align: middle;
        }
        tr:hover td {
            background-color: #f1f8ff;
        }
        
        /* 行内编辑样式 - 包括新增空白行 */
        .editing-row {
            background-color: #fff9e6 !important;
            box-shadow: inset 0 0 0 2px #2563eb;
        }
        .editing-row td {
            background-color: #fff9e6;
        }
        .new-row {
            background-color: #f0f7ff !important;
            box-shadow: inset 0 0 0 2px #0f7b4e;
        }
        .new-row td {
            background-color: #f0f7ff;
        }
        .inline-edit-input, .inline-edit-select, .inline-edit-textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #2563eb;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            background: white;
            outline: none;
            box-shadow: 0 0 0 2px #2563eb20;
        }
        .inline-edit-textarea {
            min-height: 60px;
            resize: vertical;
        }
        .inline-edit-select {
            height: 38px;
        }
        .edit-actions {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .edit-actions i {
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 30px;
        }
        .edit-actions .fa-check-circle {
            color: #0f7b4e;
        }
        .edit-actions .fa-check-circle:hover {
            background: #e0f2e9;
        }
        .edit-actions .fa-times-circle {
            color: #b13e3e;
        }
        .edit-actions .fa-times-circle:hover {
            background: #ffe6e6;
        }
        
        .rule-badge {
            background: #dee9fa;
            color: #11356e;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 12px;
            display: inline-block;
            box-shadow: inset 0 1px 3px #fff, 0 2px 4px #b6cfee;
        }
        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #c1d3ec;
            border-radius: 40px;
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active { background: #0f7b4e; }
        .toggle-switch:after {
            content: "";
            width: 20px; height: 20px;
            background: white;
            border-radius: 20px;
            position: absolute;
            top: 2px; left: 2px;
            transition: left 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .toggle-switch.active:after { left: 22px; }
        .action-icons i {
            color: #4b70a5;
            margin: 0 6px;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
            transition: 0.1s;
            padding: 6px;
            border-radius: 30px;
        }
        .action-icons i:hover {
            opacity: 1;
            background: #e4efff;
            color: #1e3a8a;
        }
        .action-icons i.fa-trash-alt:hover { color: #b22222; background: #ffebeb; }
        
        .code-tag {
            font-family: monospace;
            background: #eef3fd;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            color: #15428b;
            font-weight: 500;
        }

        /* 分页区域 */
        .pagination-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: white;
            border-top: 1px solid #e2edff;
        }
        .pagination-info {
            color: #3a5c8c;
            font-size: 14px;
            font-weight: 500;
        }
        .pagination-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .pagination-btn {
            background: white;
            border: 1px solid #cfdff2;
            color: #1f3c78;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            font-size: 14px;
        }
        .pagination-btn:hover:not(:disabled) {
            background: #f0f7ff;
            border-color: #7aa5e6;
        }
        .pagination-btn.active {
            background: #1e3a8a;
            border-color: #1e3a8a;
            color: white;
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .page-size-select {
            padding: 8px 12px;
            border: 1px solid #cfdff2;
            border-radius: 12px;
            font-size: 14px;
            color: #1f3c78;
            background: white;
            margin-left: 16px;
            outline: none;
        }
        .page-size-select:focus {
            border-color: #2563eb;
        }

        /* 美化后的检查弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 20, 50, 0.6);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: linear-gradient(145deg, #ffffff, #f8fcff);
            border-radius: 32px;
            width: 720px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px 36px;
            box-shadow: 0 30px 60px -20px #0b1e3e, 0 0 0 1px rgba(37, 99, 235, 0.1);
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(37, 99, 235, 0.2);
        }
        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2edff;
        }
        .modal-header h2 {
            font-size: 26px;
            font-weight: 700;
            color: #0f2d5a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .modal-header h2 i {
            color: #2563eb;
            background: #e8f0fe;
            padding: 10px;
            border-radius: 50%;
            font-size: 22px;
        }
        .modal-close {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f0f7ff;
            border: 1px solid #cfdff2;
            color: #1e3a8a;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            transform: rotate(90deg);
        }
        .check-result-content {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px 24px;
            border: 1px solid #e2edff;
            margin-bottom: 28px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
        }
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #eef3fa;
        }
        .check-item:last-child {

        // 添加日志
        function addLog(logItem) {
            logData.unshift(logItem);
            renderLogs();
        }

        // 渲染日志
        function renderLogs() {
            const filterVersion = logVersionFilter.value;
            const searchText = logSearch.value.toLowerCase();
            
            let filteredLogs = logData;
            if (filterVersion) {
                filteredLogs = filteredLogs.filter(log => log.version === filterVersion);
            }
            if (searchText) {
                filteredLogs = filteredLogs.filter(log => 
                    (log.ruleCode && log.ruleCode.toLowerCase().includes(searchText)) ||
                    (log.ruleName && log.ruleName.toLowerCase().includes(searchText)) ||
                    (log.action && log.action.toLowerCase().includes(searchText))
                );
            }
            
            let html = '';
            filteredLogs.forEach((log, index) => {
                let changeText = '';
                if (log.ruleCode) {
                    changeText = `【${log.ruleCode}】${log.ruleName} - ${log.action} ${log.field}`;
                    if (log.oldValue || log.newValue) {
                        changeText += `：从“${log.oldValue || '空'}”改为“${log.newValue || '空'}”`;
                    }
                } else {
                    changeText = log.action + (log.newValue ? `：${log.newValue}` : '');
                }
                
                const isCurrentVersion = log.versionId === currentVersionId;
                const currentClass = isCurrentVersion ? 'current-version' : '';
                
                html += `<div class="log-item ${currentClass}">
                    <span class="log-time"><i class="far fa-clock"></i> ${log.time}</span>
                    <span class="log-version">${log.version}</span>
                    <span class="log-user"><i class="far fa-user"></i> ${log.user}</span>
                    <span class="log-change">${changeText}</span>
                    ${log.ruleCode ? `<span class="log-detail" onclick="window.showRuleDetail('${index}')"><i class="fas fa-eye"></i> 详情</span>` : ''}
                </div>`;
            });
            logList.innerHTML = html;
        }

        function generateNewCode() {
            const maxCode = Math.max(...enriched.map(r => parseInt(r.code.substring(1)) || 0));
            return 'R' + String(maxCode + 1).padStart(3, '0');
        }

        function removeNewRow(tempId) {
            newRows = newRows.filter(row => row.tempId !== tempId);

            }
            renderTable();
        }

        // 更新新增行数据
        function updateNewRow(tempId, field, value) {
            const row = newRows.find(r => r.tempId === tempId);
            if (row) {
                row[field] = value;
            }
        }

        // 确认单行新增 - 保存记录并弹出检查弹窗
        function confirmNewRow(tempId) {
            const row = newRows.find(r => r.tempId === tempId);
            if (!row) return;
            
            // 验证必填字段
            if (!row.item || !row.content) {
                showToast('请填写规则名称和规则内容');
                return;
            }
            
            // 添加到数据源
            const { tempId: id, ...newRule } = row;
            enriched.push(newRule);
            
            // 从新增行数组中移除
            newRows = newRows.filter(r => r.tempId !== tempId);
            
            // 更新过滤数据
            filteredData = [...enriched];
            
            if (newRows.length === 0) {
                isAddingNew = false;
            }
            
            // 重新渲染表格
            renderTable();
            
            // 弹出规则合理性检查弹窗

                }
            });
            tbody.innerHTML = html;

            startSpan.innerText = filteredData.length ? start + 1 : 0;
            endSpan.innerText = end;
            totalSpan.innerText = filteredData.length;

            updatePaginationControls();
        }

        // 将更新函数挂载到window对象上，供内联事件调用
        window.updateNewRow = updateNewRow;
        window.confirmNewRow = confirmNewRow;
        window.cancelNewRow = cancelNewRow;

        // 渲染分页数字
        function renderPageNumbers() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            let html = '';
            
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            pageNumbers.innerHTML = html;

            document.querySelectorAll('#pageNumbers .pagination-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentPage = parseInt(btn.dataset.page);
                    renderTable();
                });
            });
        }

        function updatePaginationControls() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            firstBtn.disabled = currentPage === 1;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
            lastBtn.disabled = currentPage === totalPages || totalPages === 0;
            renderPageNumbers();
        }

        // 初始渲染
        renderVersions();
        renderLogs();
        renderTable();

        // 日志筛选事件
        logVersionFilter.addEventListener('change', renderLogs);
        logSearch.addEventListener('input', renderLogs);

        // 返回按钮事件
        backBtn.addEventListener('click', () => {
            configPage.classList.add('hidden');
            versionPage.classList.remove('hidden');
            // 如果正在新增，取消新增状态
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
                renderTable();
            }
            showToast('返回版本管理');
        });

        // 导入下拉菜单
        importBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            importDropdownContent.classList.toggle('show');
        });

        // 点击其他地方关闭下拉菜单
        document.addEventListener('click', (e) => {
            if (!importDropdown.contains(e.target)) {
                importDropdownContent.classList.remove('show');
            }
        });

        // 下载模板 - 直接下载
        function downloadTemplate() {
            let templateText = templateHeaders.join('\t') + '\n';
            templateData.forEach(row => {
                templateText += row.join('\t') + '\n';
            });
            
            const blob = new Blob([templateText], { type: 'application/vnd.ms-excel' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '规则配置导入模板.xlsx';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            showToast('模板下载成功');
        }

        downloadTemplateBtn.addEventListener('click', () => {
            importDropdownContent.classList.remove('show');
            downloadTemplate();
        });

        // 导入文件
        importFileBtn.addEventListener('click', () => {
            importDropdownContent.classList.remove('show');
            importModal.classList.add('show');
        });

        closeImportModal.addEventListener('click', () => {
            importModal.classList.remove('show');
        });

        cancelImportBtn.addEventListener('click', () => {
            importModal.classList.remove('show');
        });

        selectFileBtn.addEventListener('click', () => {
            showToast('演示：导入表格成功，正在进行规则合理性检查');
            importModal.classList.remove('show');
            setTimeout(() => {
                showCheckModal('导入');
            }, 300);
        });

        // 新增规则按钮
        newRuleBtn.addEventListener('click', () => {
            // 如果已经有编辑中的行，先退出
            if (editingRowIndex !== -1) {
                editingRowIndex = -1;
            }
            // 切换到第一页
            currentPage = 1;
            addNewRow();
        });

        // 规则合理性检查弹窗
        function showCheckModal(action) {
            const checkResults = [
                {
                    status: 'pass',
                    title: '规则完整性检查',
                    desc: action === '新增' ? '新增规则包含规则内容、结果处理等必要字段，符合规范要求。' : '导入的规则均包含规则内容、结果处理等必要字段，符合规范要求。',
                    suggestion: ''
                },
                {
                    status: 'warn',
                    title: '规则冲突检测',
                    desc: action === '新增' ? '检测到新规则与现有规则可能存在潜在冲突。' : '检测到导入规则与现有规则存在潜在冲突。',
                    suggestion: '建议检查规则适用范围，避免审核逻辑重复。'
                },
                {
                    status: 'warn',
                    title: '结果处理完整性',
                    desc: action === '新增' ? '新规则的结果处理内容可以进一步细化。' : '部分导入规则的结果处理内容过于简单，可能影响用户体验。',
                    suggestion: '建议为规则补充更详细的结果处理说明，增加具体操作指引。'
                }
            ];

            let html = '';
            checkResults.forEach(item => {
                let icon = '';
                if (item.status === 'pass') {
                    icon = '<i class="fas fa-check-circle"></i>';
                } else if (item.status === 'warn') {
                    icon = '<i class="fas fa-exclamation-triangle"></i>';
                } else {
                    icon = '<i class="fas fa-times-circle"></i>';
                }
                
                html += `<div class="check-item">
                    <div class="status-icon ${item.status}">${icon}</div>
                    <div class="check-detail">
                        <div class="check-title">${item.title}</div>
                        <div class="check-desc">${item.desc}</div>
                        ${item.suggestion ? `<div class="check-suggestion"><i class="fas fa-lightbulb"></i> ${item.suggestion}</div>` : ''}
                    </div>
                </div>`;
            });
            
            modalCheckResult.innerHTML = html;
            checkModal.classList.add('show');
        }

        function closeCheckModal() {
            checkModal.classList.remove('show');
        }

        editRuleBtn.addEventListener('click', () => {
            showToast('请点击表格中的编辑图标进行编辑');
        });

        closeModal.addEventListener('click', closeCheckModal);
        modalCancel.addEventListener('click', closeCheckModal);
        modalConfirm.addEventListener('click', () => {
            closeCheckModal();
            showToast('操作已继续');
        });

        checkModal.addEventListener('click', (e) => {
            if (e.target === checkModal) closeCheckModal();
        });

        // toast
        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').innerText = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 保存编辑
        function saveEdit(index) {
            const rule = filteredData[index];
            if (!rule) return;
            
            const oldRule = {...rule};
            
            rule.active = document.getElementById(`edit_active_${index}`).value === 'true';
            rule.category = document.getElementById(`edit_category_${index}`).value;
            rule.item = document.getElementById(`edit_item_${index}`).value;
            rule.invoiceType = document.getElementById(`edit_invoice_${index}`).value;
            rule.content = document.getElementById(`edit_content_${index}`).value;
            rule.result = document.getElementById(`edit_result_${index}`).value;
            
            addLog({
                time: new Date().toISOString().slice(0,10) + ' ' + new Date().toTimeString().slice(0,8),
                version: currentVersion ? currentVersion.id : 'v1.2.0',
                versionId: currentVersion ? currentVersion.id : 'v1.2.0',
                user: '当前用户',
                ruleCode: rule.code,
                ruleName: rule.item,
                action: '修改',
                field: '规则内容',
                oldValue: oldRule.content,
                newValue: rule.content
            });
            
            editingRowIndex = -1;
            renderTable();
            showToast('规则已更新');
        }

        function cancelEdit() {
            editingRowIndex = -1;
            renderTable();
            showToast('已取消编辑');
        }

        document.addEventListener('click', (e) => {
            const target = e.target;
            
            if (target.classList.contains('toggle-switch')) {
                const code = target.dataset.code;
                const rule = enriched.find(r => r.code === code);
                if (rule) {
                    const oldActive = rule.active;
                    rule.active = !rule.active;
                    const index = filteredData.findIndex(r => r.code === code);
                    if (index !== -1) filteredData[index].active = rule.active;
                    
                    addLog({
                        time: new Date().toISOString().slice(0,10) + ' ' + new Date().toTimeString().slice(0,8),
                        version: currentVersion ? currentVersion.id : 'v1.2.0',
                        versionId: currentVersion ? currentVersion.id : 'v1.2.0',
                        user: '当前用户',
                        ruleCode: rule.code,
                        ruleName: rule.item,
                        action: rule.active ? '启用' : '停用',
                        field: '状态',
                        oldValue: oldActive ? '启用' : '停用',
                        newValue: rule.active ? '启用' : '停用'
                    });
                    
                    renderTable();
                    showToast(rule.active ? '规则已启用' : '规则已停用');
                }
                return;
            }
            
            if (target.tagName === 'I' && target.dataset.action) {
                const action = target.dataset.action;
                const code = target.dataset.code;
                const index = target.dataset.index;
                
                if (action === 'edit' && index !== undefined) {
                    // 如果正在新增，先退出新增模式
                    if (isAddingNew) {
                        newRows = [];
                        isAddingNew = false;
                    }
                    editingRowIndex = parseInt(index);
                    renderTable();
                    return;
                }
                
                if (action === 'delete' && code) {
                    const rule = enriched.find(r => r.code === code);
                    if (!rule) return;
                    if (confirm(`确定删除规则“${rule.item}”?`)) {
                        const idx = enriched.findIndex(r => r.code === code);
                        if (idx !== -1) {
                            enriched.splice(idx, 1);
                            filteredData = [...enriched];
                            if (filteredData.length > 0 && (currentPage - 1) * pageSize >= filteredData.length) {
                                currentPage = Math.max(1, Math.ceil(filteredData.length / pageSize));
                            }
                            
                            addLog({
                                time: new Date().toISOString().slice(0,10) + ' ' + new Date().toTimeString().slice(0,8),
                                version: currentVersion ? currentVersion.id : 'v1.2.0',
                                versionId: currentVersion ? currentVersion.id : 'v1.2.0',
                                user: '当前用户',
                                ruleCode: rule.code,
                                ruleName: rule.item,
                                action: '删除',
                                field: '',
                                oldValue: '',
                                newValue: ''
                            });
                            
                            renderTable();
                            showToast('已删除');
                        }
                    }
                    return;
                }
                
                if (action === 'save-edit' && target.dataset.index !== undefined) {
                    saveEdit(parseInt(target.dataset.index));
                    return;
                }
                
                if (action === 'cancel-edit') {
                    cancelEdit();
                    return;
                }
            }
        });

        // AI按钮
        document.getElementById('aiBtn').addEventListener('click', ()=>{
            const val = document.getElementById('aiInput').value.trim();
            showToast(val ? `AI配置: “${val}”` : '请输入自然语言指令');
        });

        // 查询按钮
        document.getElementById('queryBtn').addEventListener('click', ()=>{
            if (editingRowIndex !== -1) editingRowIndex = -1;
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
            }
            
            const code = document.getElementById('queryCode').value.toLowerCase();
            const category = document.getElementById('queryCategory').value;
            const item = document.getElementById('queryItem').value.toLowerCase();
            const invoice = document.getElementById('queryInvoice').value.toLowerCase();
            const content = document.getElementById('queryContent').value.toLowerCase();
            const result = document.getElementById('queryResult').value.toLowerCase();

            filteredData = enriched.filter(r => {
                if (code && !r.code.toLowerCase().includes(code)) return false;
                if (category && r.category !== category) return false;
                if (item && !r.item.toLowerCase().includes(item)) return false;
                if (invoice && !r.invoiceType.toLowerCase().includes(invoice)) return false;
                if (content && !r.content.toLowerCase().includes(content)) return false;
                if (result && !r.result.toLowerCase().includes(result)) return false;
                return true;
            });

            currentPage = 1;
            renderTable();
            showToast(`查询到 ${filteredData.length} 条结果`);
        });

        // 重置按钮
        document.getElementById('resetBtn').addEventListener('click', ()=>{
            if (editingRowIndex !== -1) editingRowIndex = -1;
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
            }
            
            document.getElementById('queryCode').value = '';
            document.getElementById('queryCategory').value = '';
            document.getElementById('queryItem').value = '';
            document.getElementById('queryInvoice').value = '';
            document.getElementById('queryContent').value = '';
            document.getElementById('queryResult').value = '';
            
            filteredData = [...enriched];
            currentPage = 1;
            renderTable();
            showToast('已重置查询条件');
        });

        // 分页事件
        firstBtn.addEventListener('click', () => {
            if (editingRowIndex !== -1) editingRowIndex = -1;
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
            }
            currentPage = 1;
            renderTable();
        });

        prevBtn.addEventListener('click', () => {
            if (editingRowIndex !== -1) editingRowIndex = -1;
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
            }
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (editingRowIndex !== -1) editingRowIndex = -1;
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
            }
            const totalPages = Math.ceil(filteredData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        });

        lastBtn.addEventListener('click', () => {
            if (editingRowIndex !== -1) editingRowIndex = -1;
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
            }
            const totalPages = Math.ceil(filteredData.length / pageSize);
            currentPage = totalPages;
            renderTable();
        });

        pageSizeSelect.addEventListener('change', (e) => {
            if (editingRowIndex !== -1) editingRowIndex = -1;
            if (isAddingNew) {
                newRows = [];
                isAddingNew = false;
            }
            pageSize = parseInt(e.target.value);
            currentPage = 1;
            renderTable();
        });

        // 全选
        document.querySelector('thead input[type="checkbox"]')?.addEventListener('change', (e)=>{
            document.querySelectorAll('.rowCheckbox').forEach(cb => cb.checked = e.target.checked);
        });
    })();
</script>
<!-- 说明：彻底修复了新增规则点击确认和取消按钮无反应的问题。现在点击确认按钮会保存记录并弹出规则合理性检查弹窗，点击取消按钮会取消新增。所有按钮都能正常工作。 -->
</body>
</html>
