        tailwind.config = {

        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .field-card {
                @apply bg-white rounded-lg shadow-md p-3 mb-3 border border-gray-200 transition-all duration-200 hover:shadow-lg;
            }
            .field-card.dragging {
                @apply opacity-50 shadow-lg;
            }
            .drop-zone {
                @apply border-2 border-dashed border-gray-300 rounded-lg p-4 mb-3 transition-all duration-200;
            }
            .drop-zone.drag-over {
                @apply border-primary bg-primary/5;
            }
            .sidebar-item {
                @apply flex items-center p-2 rounded-lg hover:bg-gray-100 cursor-pointer transition-all duration-200;
            }
            .sidebar-item.active {
                @apply bg-primary/10 text-primary;
            }
        }
    </style>

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderFieldCanvas();
            setupEventListeners();
        });

        // 渲染字段配置画布
        function renderFieldCanvas() {
            const canvasContainer = document.getElementById('field-canvas');
            canvasContainer.innerHTML = '';
            
            // 按分组整理字段
            const fieldGroups = {};
            currentFields.forEach(field => {
                if (!fieldGroups[field.section]) {
                    fieldGroups[field.section] = [];
                }
                fieldGroups[field.section].push(field);
            });
            
            // 渲染每个分组
            Object.keys(fieldGroups).forEach(section => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'space-y-3';
                
                const sectionHeader = document.createElement('div');
                sectionHeader.className = 'flex justify-between items-center mb-2';
                sectionHeader.innerHTML = `
                    <h3 class="font-medium text-lg text-dark">${section}</h3>
                    <button class="text-primary hover:text-primary/80 transition-colors duration-200 text-sm" data-section="${section}">
                        <i class="fa fa-plus-circle mr-1"></i>添加字段
                    </button>
                `;
                sectionDiv.appendChild(sectionHeader);
                
                const fieldsContainer = document.createElement('div');
                fieldsContainer.className = 'space-y-2';
                fieldsContainer.dataset.section = section;
                
                // 按位置排序字段
                const sortedFields = fieldGroups[section].sort((a, b) => a.position - b.position);
                
                // 渲染每个字段
                sortedFields.forEach(field => {
                    const fieldCard = createFieldCard(field);
                    fieldsContainer.appendChild(fieldCard);
                });
                
                // 添加拖放区域
                const dropZone = document.createElement('div');
                dropZone.className = 'drop-zone';
                dropZone.dataset.section = section;
                dropZone.innerHTML = '<p class="text-center text-gray-500 text-sm">拖拽字段到此处</p>';
                fieldsContainer.appendChild(dropZone);
                
                sectionDiv.appendChild(fieldsContainer);
                canvasContainer.appendChild(sectionDiv);
            });
            
            // 添加新分组按钮
            const addSectionButton = document.createElement('div');
            addSectionButton.className = 'drop-zone mt-6';
            addSectionButton.innerHTML = '<p class="text-center text-gray-500 text-sm">点击或拖拽字段到此处创建新分组</p>';
            canvasContainer.appendChild(addSectionButton);
        }

        // 创建字段卡片
        function createFieldCard(field) {
            const fieldCard = document.createElement('div');
            fieldCard.className = 'field-card';
            fieldCard.dataset.fieldId = field.id;
            fieldCard.draggable = true;
            
            fieldCard.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="flex items-center mb-1">
                            <span class="text-sm font-medium text-dark">${field.label}</span>
                            ${field.required ? '<span class="ml-1 text-xs text-red-500 bg-red-100 px-1 rounded">必填</span>' : ''}
                        </div>
                        <div class="text-xs text-gray-500">${getFieldTypeName(field.type)}</div>
                    </div>
                    <div class="flex items-center space-x-1 ml-2">
                        <button class="text-gray-400 hover:text-primary transition-colors duration-200 edit-field" title="编辑字段">
                            <i class="fa fa-pencil"></i>
                        </button>
                        <button class="text-gray-400 hover:text-red-500 transition-colors duration-200 delete-field" title="删除字段">
                            <i class="fa fa-trash"></i>
                        </button>
                        <button class="text-gray-400 hover:text-primary transition-colors duration-200 move-field" title="移动字段">
                            <i class="fa fa-arrows"></i>
                        </button>
                    </div>
                </div>
            `;
            
            // 添加事件监听
            fieldCard.addEventListener('dragstart', handleDragStart);
            fieldCard.addEventListener('dragend', handleDragEnd);
            fieldCard.querySelector('.edit-field').addEventListener('click', function() {
                selectField(field);
            });
            fieldCard.querySelector('.delete-field').addEventListener('click', function() {
                deleteField(field.id);
            });
            
            return fieldCard;
        }

        // 处理拖拽开始
        function handleDragStart(e) {
            e.target.classList.add('dragging');
            e.dataTransfer.setData('text/plain', e.target.dataset.fieldId);
        }

        // 处理拖拽结束
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 模块选择器变化
            document.getElementById('module-selector').addEventListener('change', function() {
                currentModule = this.value;
                currentFields = [...moduleFields[currentModule]];
                renderFieldCanvas();
                clearFieldProperties();
            });
            
            // 保存配置
            document.getElementById('save-config').addEventListener('click', function() {
                // 这里可以添加保存逻辑
                alert('配置已保存');
            });
            
            // 重置配置
            document.getElementById('reset-config').addEventListener('click', function() {
                if (confirm('确定要重置配置吗？这将恢复到初始状态。')) {
                    currentFields = [...moduleFields[currentModule]];
                    renderFieldCanvas();
                    clearFieldProperties();
                }
            });
            
            // 添加新分组
            document.getElementById('add-section').addEventListener('click', function() {
                const sectionName = prompt('请输入分组名称：');
                if (sectionName) {
                    addSection(sectionName);
                }
            });
            
            // 拖放区域事件
            document.addEventListener('dragover', handleDragOver);
            document.addEventListener('drop', handleDrop);
        }

        // 处理拖拽悬停
        function handleDragOver(e) {
            e.preventDefault();
            if (e.target.closest('.drop-zone')) {
                e.target.closest('.drop-zone').classList.add('drag-over');
            }
        }

        // 处理拖拽放下
        function handleDrop(e) {
            e.preventDefault();
            const dropZone = e.target.closest('.drop-zone');
            if (dropZone) {
                dropZone.classList.remove('drag-over');
                
                const data = e.dataTransfer.getData('text/plain');
                if (data.startsWith('new-')) {
                    // 新字段
                    const fieldType = data.replace('new-', '');
                    createNewField(fieldType, dropZone.dataset.section);
                } else {
                    // 现有字段
                    const fieldId = parseInt(data);
                    const field = currentFields.find(f => f.id === fieldId);
                    if (field) {
                        moveField(field, dropZone.dataset.section);
                    }
                }
            }
        }

        // 创建新字段
        function createNewField(fieldType, section) {
            const fieldLabel = prompt('请输入字段名称：');
            if (fieldLabel) {
                const newField = {
                    id: Date.now(),
                    label: fieldLabel,
                    type: fieldType,
                    required: false,
                    position: currentFields.length + 1,
                    section: section || '新分组'
                };
                
                currentFields.push(newField);
                renderFieldCanvas();
                selectField(newField);
            }
        }



        // 移动字段
        function moveField(field, newSection) {
            field.section = newSection;
            renderFieldCanvas();
        }

        // 删除字段
        function deleteField(fieldId) {
            if (confirm('确定要删除该字段吗？')) {
                currentFields = currentFields.filter(f => f.id !== fieldId);
                renderFieldCanvas();
                clearFieldProperties();
            }
        }

        // 选择字段
        function selectField(field) {
            selectedField = field;
            renderFieldProperties(field);
        }

        // 渲染字段属性
        function renderFieldProperties(field) {
            const propertiesContainer = document.getElementById('field-properties');
            propertiesContainer.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">字段名称</label>
                        <input type="text" id="field-label" value="${field.label}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">字段类型</label>
                        <select id="field-type" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
                            <option value="text" ${field.type === 'text' ? 'selected' : ''}>单行文本</option>
                            <option value="textarea" ${field.type === 'textarea' ? 'selected' : ''}>多行文本</option>
                            <option value="number" ${field.type === 'number' ? 'selected' : ''}>数字</option>
                            <option value="date" ${field.type === 'date' ? 'selected' : ''}>日期</option>
                            <option value="select" ${field.type === 'select' ? 'selected' : ''}>下拉选择</option>
                            <option value="checkbox" ${field.type === 'checkbox' ? 'selected' : ''}>复选框</option>
                            <option value="radio" ${field.type === 'radio' ? 'selected' : ''}>单选框</option>
                        </select>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="field-required" ${field.required ? 'checked' : ''} class="h-4 w-4 text-primary focus:ring-primary/50 border-gray-300 rounded">
                        <label for="field-required" class="ml-2 block text-sm text-gray-700">是否必填</label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">所属分组</label>
                        <input type="text" id="field-section" value="${field.section}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">字段位置</label>
                        <input type="number" id="field-position" value="${field.position}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary">
                    </div>
                    <div>
                        <button id="save-field-properties" class="w-full bg-primary text-white px-4 py-2 rounded-md hover:bg-primary/90 transition-colors duration-200">
                            保存属性
                        </button>
                    </div>
                </div>
            `;
            
            // 保存属性
            document.getElementById('save-field-properties').addEventListener('click', function() {
                const updatedField = {
                    ...selectedField,
                    label: document.getElementById('field-label').value,
                    type: document.getElementById('field-type').value,
                    required: document.getElementById('field-required').checked,
                    section: document.getElementById('field-section').value,
                    position: parseInt(document.getElementById('field-position').value)
                };
                
                // 更新字段
                const index = currentFields.findIndex(f => f.id === updatedField.id);
                if (index !== -1) {
                    currentFields[index] = updatedField;
                    renderFieldCanvas();
                    selectField(updatedField);
                    alert('字段属性已保存');
                }
            });
        }

        // 清空字段属性
        function clearFieldProperties() {
            const propertiesContainer = document.getElementById('field-properties');
            propertiesContainer.innerHTML = `
                <div class="text-center text-gray-500 py-8">
                    <i class="fa fa-hand-pointer-o text-4xl mb-2"></i>
                    <p>选择一个字段来编辑属性</p>
                </div>
            `;
        }

        // 获取字段图标
        function getFieldIcon(type) {
            const icons = {
                'text': 'font',
                'textarea': 'align-left',
                'number': 'calculator',
                'date': 'calendar',
                'select': 'list-select',
                'checkbox': 'check-square-o',
                'radio': 'dot-circle-o'
            };
            return icons[type] || 'question';
        }

        // 获取字段类型名称
        function getFieldTypeName(type) {
            const names = {
                'text': '单行文本',
                'textarea': '多行文本',
                'number': '数字',
                'date': '日期',
                'select': '下拉选择',
                'checkbox': '复选框',
                'radio': '单选框'
            };
            return names[type] || '未知类型';
        }

        // 添加新分组
        function addSection(sectionName) {
            // 检查分组是否已存在
            const sectionExists = currentFields.some(f => f.section === sectionName);
            if (sectionExists) {
                alert('该分组已存在');
                return;
            }
            
            // 添加一个空字段到新分组
            const newField = {
                id: Date.now(),
                label: '新字段',
                type: 'text',
                required: false,
                position: 1,
                section: sectionName
            };
            
            currentFields.push(newField);
            renderFieldCanvas();
            selectField(newField);
        }
    </script>

</body></html>
